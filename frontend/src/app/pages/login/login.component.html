<div class="min-h-screen bg-[#F5F5F5] flex items-center justify-center font-sans">
  <div class="flex flex-col items-center w-full px-4">

    <!-- Card principal -->
    <div class="bg-white rounded-[20px] w-full max-w-[440px] mx-4 px-12 py-10"
         style="box-shadow: 0 4px 24px rgba(0,0,0,0.08)">

      <!-- Logo -->
      <div class="flex flex-col items-center">
        <div class="flex items-center gap-3">
          <i class="fa-solid fa-tag text-[28px] text-[#374151]"></i>
          <span class="text-[28px] font-bold text-[#1a1a2e]">ML Gestor</span>
        </div>
        <p class="text-[15px] text-[#666666] text-center leading-relaxed mt-2">
          Gerencie seus anúncios do Mercado Livre
        </p>
      </div>

      <!-- Botão principal -->
      <a
        [href]="loginUrl"
        class="mt-8 flex items-center justify-center gap-[10px] w-full py-4 rounded-xl
               bg-[#FFE600] text-[#1a1a2e] font-semibold text-base border-none cursor-pointer
               transition-all duration-200 ease-in-out no-underline
               hover:bg-[#f0d800] hover:-translate-y-[1px]"
        style="hover:box-shadow: 0 4px 12px rgba(255,230,0,0.4)"
      >
        <i class="fa-solid fa-arrow-up-right-from-square"></i>
        Entrar com Mercado Livre
      </a>

      <!-- Divisor -->
      <div class="flex items-center my-7">
        <div class="flex-1 h-px bg-[#e5e7eb]"></div>
        <span class="px-4 text-[13px] text-[#9ca3af]">ou</span>
        <div class="flex-1 h-px bg-[#e5e7eb]"></div>
      </div>

      <!-- Seção de ajuda -->
      <div class="flex flex-col items-center gap-[10px]">
        <p class="text-[13px] text-[#9ca3af] text-center">
          Precisa de ajuda para começar?
        </p>
        <div class="flex items-center gap-2">
          <a href="#" class="text-[#3B82F6] text-[13px] no-underline hover:underline">Como funciona</a>
          <span class="text-[#d1d5db] text-[13px]">•</span>
          <a href="#" class="text-[#3B82F6] text-[13px] no-underline hover:underline">Suporte</a>
        </div>
      </div>

      <!-- Footer do card -->
      <div class="mt-10 flex flex-wrap items-center justify-center gap-2">
        <span class="text-[11px] text-[#9ca3af]">© 2024 ML Gestor</span>
        <span class="text-[#d1d5db] text-[11px]">•</span>
        <a href="#" class="text-[11px] text-[#9ca3af] no-underline hover:text-[#6b7280]">Privacidade</a>
        <span class="text-[#d1d5db] text-[11px]">•</span>
        <a href="#" class="text-[11px] text-[#9ca3af] no-underline hover:text-[#6b7280]">Termos</a>
      </div>

    </div>

    <!-- Badge conexão segura -->
    <div class="mt-6 inline-flex items-center bg-[#f0fdf4] rounded-full px-4 py-2">
      <i class="fa-solid fa-shield-halved text-[#16a34a] text-[14px] mr-[6px]"></i>
      <span class="text-[#15803d] text-[13px] font-medium">Conexão segura</span>
    </div>

  </div>
</div>
